# Environment Args
output_root: '../../'
pytorch_data_dir: 'train'
submitting_to_aml: false

# Dataset args
dataset: "custom"

# Model Args
model_type: "dinov3"
activation_type: "token"
source: "huggingface"
arch: "checkpoints/dinov3-vits16plus-pretrain-lvd1689m"
weights: "checkpoints/dinov3-vits16plus-pretrain-lvd1689m"

# Upsampling args
outlier_detection: True
upsampler_type: "jbu_stack"
downsampler_type: "attention"
max_pad: 30
max_zoom: 2
n_jitters: 5
random_projection: 30
crf_weight: 0.001
filter_ent_weight: 0.0
tv_weight: 0.0

implicit_sup_weight: 1.0

# Training args
batch_size: 4
epochs: 500
num_gpus: 1
num_workers: 24
lr: 1e-3

# No need to change
hydra:
  run:
    dir: "."
  output_subdir: ~

